<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Resize Tokens</title>

  <script type="module">
    import OBR from "https://unpkg.com/@owlbear-rodeo/sdk@latest/dist/index.mjs";

    async function resizeSelected() {
      const items = await OBR.scene.items.getItems();

      const selected = items.filter(item => item.selected);

      if (selected.length === 0) {
        alert("Выдели токены");
        return;
      }

      await OBR.scene.items.updateItems(
        selected.map(i => i.id),
        items => {
          for (const item of items) {
            item.image.width = 100;
            item.image.height = 100;
          }
        }
      );
    }

    OBR.onReady(() => {
      document
        .getElementById("resize")
        .addEventListener("click", resizeSelected);
    });
  </script>
</head>

<body style="font-family:sans-serif;padding:10px;">
  <button id="resize">
    Сделать 100x100
  </button>
</body>
</html>
